# For local development only!
gitalk:
  enable: false
  autoExpand: true
  clientID: ''
  clientSecret: ''
  repo: 'dev-blog-comments'
  owner: 'TriDiamond'
  admin: ['TriDiamond']
  id: uid
  language: en
  distractionFreeMode: true
  recentComment: true
  proxy: ''

# Valine comment plugin (recommended!)
# see https://valine.js.org/quickstart.html
valine:
  enable: true
  app_id: nrR4fDQkQmTJIx799DYd33tf-gzGzoHsz
  app_key: n8NBypfNexCSN5Yqyi5gMrcM
  avatar: 'mp'
  placeholder: Leave your thoughts behind~
  visitor: true
  lang: cn
  avatarForce: false
  meta: ['nick', 'mail']
  requiredFields: []
  admin: 'phpzc'
  recentComment: true

# Enable Busuanzi statistic plugin
# see http://ibruce.info/2015/04/04/busuanzi/
busuanzi:
  enable: true

copy_protection:
  enable: true
  author:
    cn: 作者
    en: Author
